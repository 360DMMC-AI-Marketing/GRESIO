<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="diamond" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2347e8"/>
      <stop offset="40%" stop-color="#667eea"/>
      <stop offset="70%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.2)"/>
      <stop offset="60%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.02)"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#2347e8" flood-opacity="0.4"/>
    </filter>
    <filter id="innerGlow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#a78bfa" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Dark premium background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Subtle border ring -->
  <rect x="6" y="6" width="500" height="500" rx="94" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <!-- Outer diamond -->
  <path d="M256 32 L480 256 L256 480 L32 256 Z" fill="url(#diamond)" filter="url(#glow)" opacity="0.95"/>
  <!-- Shine overlay on outer diamond -->
  <path d="M256 32 L480 256 L256 480 L32 256 Z" fill="url(#shine)"/>
  <!-- Edge highlight lines -->
  <path d="M256 32 L480 256" stroke="url(#edge)" stroke-width="1.5" fill="none"/>
  <path d="M256 32 L32 256" stroke="url(#edge)" stroke-width="1" fill="none"/>
  <!-- Inner diamond offset -->
  <path d="M256 72 L440 256 L256 440 L72 256 Z" fill="rgba(255,255,255,0.06)" filter="url(#innerGlow)"/>
  <!-- Center diamond -->
  <path d="M256 120 L392 256 L256 392 L120 256 Z" fill="rgba(255,255,255,0.1)"/>
  <path d="M256 120 L392 256 L256 392 L120 256 Z" stroke="rgba(255,255,255,0.08)" stroke-width="1" fill="none"/>
  <!-- Central G letter -->
  <text x="256" y="310" font-family="'SF Pro Display', system-ui, -apple-system, sans-serif" font-size="220" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-4">G</text>
  <!-- Tiny accent sparkle dots -->
  <circle cx="420" cy="100" r="3" fill="rgba(255,255,255,0.15)"/>
  <circle cx="100" cy="400" r="2" fill="rgba(255,255,255,0.1)"/>
  <circle cx="390" cy="420" r="1.5" fill="rgba(255,255,255,0.08)"/>
  <circle cx="110" cy="110" r="2" fill="rgba(255,255,255,0.12)"/>
</svg>
