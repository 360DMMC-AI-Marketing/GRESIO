name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --prefix frontend --ignore-scripts
        name: Install frontend deps
      - run: npm install --prefix backend --ignore-scripts
        name: Install backend deps
      - run: npx -y eslint frontend/src --no-eslintrc --config frontend/.eslintrc.cjs --max-warnings 1000 2>&1 || true
        name: Lint frontend
      - run: npx -y eslint backend/src --no-eslintrc --config backend/.eslintrc.cjs --max-warnings 1000 2>&1 || true
        name: Lint backend
