version: '3.8'

services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  backend:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file: ./backend/.env
    depends_on:
      - mongodb
    environment:
      MONGODB_URI: mongodb://mongodb:27017/gresio

volumes:
  mongo_data:
